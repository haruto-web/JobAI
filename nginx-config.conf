server {
    listen 80;
    server_name your-domain.com;  # Replace with your domain or EC2 public IP
    
    root /var/www/ai-job-recommendation/frontend/build;
    index index.html;

    # Frontend - React App
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API - Laravel
    location /api {
        alias /var/www/ai-job-recommendation/backend/public;
        try_files $uri $uri/ @laravel;
        
        location ~ \.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
            fastcgi_param SCRIPT_FILENAME /var/www/ai-job-recommendation/backend/public/index.php;
            include fastcgi_params;
        }
    }

    location @laravel {
        rewrite /api/(.*)$ /api/index.php?/$1 last;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logs
    access_log /var/log/nginx/ai-job-recommendation-access.log;
    error_log /var/log/nginx/ai-job-recommendation-error.log;
}
